services:
  - type: web
    name: real-estate-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/realestate.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app # Update this after deploying Vercel
      - key: ADMIN_TOKEN
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
